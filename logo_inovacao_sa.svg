<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" fill="#1A0533"/>

  <!-- espiral / órbita de inovação -->
  <circle cx="100" cy="90" r="54" fill="none" stroke="#9B59B6" stroke-width="1" opacity="0.2"/>
  <circle cx="100" cy="90" r="38" fill="none" stroke="#9B59B6" stroke-width="1" opacity="0.3"/>

  <!-- órbita inclinada -->
  <ellipse cx="100" cy="90" rx="54" ry="20" fill="none" stroke="#BDC3F8" stroke-width="2" opacity="0.5" transform="rotate(-30 100 90)"/>
  <ellipse cx="100" cy="90" rx="54" ry="20" fill="none" stroke="#9B59B6" stroke-width="1.5" opacity="0.4" transform="rotate(30 100 90)"/>

  <!-- núcleo brilhante -->
  <circle cx="100" cy="90" r="22" fill="#2D0B55"/>
  <circle cx="100" cy="90" r="18" fill="#6C3483"/>
  <circle cx="100" cy="90" r="12" fill="#9B59B6"/>
  <circle cx="100" cy="90" r="6" fill="#D7BDE2"/>

  <!-- partículas em órbita -->
  <circle cx="154" cy="90" r="5" fill="#BDC3F8"/>
  <circle cx="46" cy="90" r="4" fill="#9B59B6" opacity="0.8"/>
  <circle cx="100" cy="36" r="3" fill="#BDC3F8" opacity="0.6"/>
  <circle cx="126" cy="52" r="3" fill="#6C3483" opacity="0.9"/>
  <circle cx="74" cy="128" r="3" fill="#BDC3F8" opacity="0.5"/>

  <text font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#D7BDE2" x="100" y="158" text-anchor="middle" letter-spacing="3">INOVAÇÃO</text>
  <text font-family="Arial, sans-serif" font-size="9" fill="#6C3483" x="100" y="172" text-anchor="middle" letter-spacing="6">S.A.</text>

  <!-- linha gradiente ornamental -->
  <line x1="50" y1="179" x2="150" y2="179" stroke="#6C3483" stroke-width="0.8" opacity="0.6"/>
</svg>
