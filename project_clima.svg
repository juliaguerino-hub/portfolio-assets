<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#1A2744"/>

  <!-- fundo céu com nuvens geométricas -->
  <rect width="400" height="160" fill="#1E3A6E"/>
  <ellipse cx="80" cy="60" rx="50" ry="28" fill="#2A4F8C" opacity="0.6"/>
  <ellipse cx="120" cy="52" rx="36" ry="22" fill="#2A4F8C" opacity="0.5"/>
  <ellipse cx="310" cy="40" rx="60" ry="30" fill="#2A4F8C" opacity="0.4"/>
  <ellipse cx="360" cy="34" rx="40" ry="20" fill="#2A4F8C" opacity="0.3"/>

  <!-- sol -->
  <circle cx="300" cy="80" r="36" fill="#F0C040" opacity="0.15"/>
  <circle cx="300" cy="80" r="26" fill="#F5D060" opacity="0.4"/>
  <circle cx="300" cy="80" r="18" fill="#FAE080"/>

  <!-- temperatura principal -->
  <text font-family="Georgia, serif" font-size="64" font-weight="700" fill="#FFFFFF" x="40" y="128" opacity="0.95">24°</text>
  <text font-family="Arial, sans-serif" font-size="13" fill="#A8C4E8" x="42" y="148">São Paulo, BR</text>

  <!-- condição -->
  <text font-family="Arial, sans-serif" font-size="11" fill="#F5D060" x="42" y="166">Parcialmente nublado</text>

  <!-- divisor -->
  <line x1="0" y1="172" x2="400" y2="172" stroke="#2A4F8C" stroke-width="1"/>

  <!-- previsão dos próximos dias -->
  <rect x="0" y="172" width="400" height="80" fill="#152036"/>

  <!-- dia 1 -->
  <text font-family="Arial" font-size="9" fill="#A8C4E8" x="36" y="196" text-anchor="middle">SEG</text>
  <circle cx="36" cy="214" r="10" fill="#F5D060" opacity="0.8"/>
  <text font-family="Arial" font-size="10" font-weight="700" fill="#FFFFFF" x="36" y="234" text-anchor="middle">26°</text>

  <!-- dia 2 -->
  <text font-family="Arial" font-size="9" fill="#A8C4E8" x="100" y="196" text-anchor="middle">TER</text>
  <ellipse cx="100" cy="214" rx="13" ry="9" fill="#8BAFD4" opacity="0.7"/>
  <text font-family="Arial" font-size="10" font-weight="700" fill="#FFFFFF" x="100" y="234" text-anchor="middle">21°</text>

  <!-- dia 3 -->
  <text font-family="Arial" font-size="9" fill="#A8C4E8" x="164" y="196" text-anchor="middle">QUA</text>
  <ellipse cx="164" cy="213" rx="12" ry="8" fill="#8BAFD4" opacity="0.6"/>
  <line x1="156" y1="224" x2="159" y2="230" stroke="#6EB4F7" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="163" y1="224" x2="166" y2="230" stroke="#6EB4F7" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="170" y1="224" x2="173" y2="230" stroke="#6EB4F7" stroke-width="1.5" stroke-linecap="round"/>
  <text font-family="Arial" font-size="10" font-weight="700" fill="#FFFFFF" x="164" y="240" text-anchor="middle">18°</text>

  <!-- dia 4 -->
  <text font-family="Arial" font-size="9" fill="#A8C4E8" x="228" y="196" text-anchor="middle">QUI</text>
  <circle cx="228" cy="214" r="10" fill="#F5D060" opacity="0.8"/>
  <text font-family="Arial" font-size="10" font-weight="700" fill="#FFFFFF" x="228" y="234" text-anchor="middle">28°</text>

  <!-- dia 5 -->
  <text font-family="Arial" font-size="9" fill="#A8C4E8" x="292" y="196" text-anchor="middle">SEX</text>
  <circle cx="292" cy="214" r="10" fill="#F5D060" opacity="0.7"/>
  <text font-family="Arial" font-size="10" font-weight="700" fill="#FFFFFF" x="292" y="234" text-anchor="middle">27°</text>

  <!-- dia 6 -->
  <text font-family="Arial" font-size="9" fill="#A8C4E8" x="356" y="196" text-anchor="middle">SÁB</text>
  <ellipse cx="356" cy="213" rx="12" ry="8" fill="#8BAFD4" opacity="0.6"/>
  <line x1="348" y1="224" x2="351" y2="230" stroke="#6EB4F7" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="355" y1="224" x2="358" y2="230" stroke="#6EB4F7" stroke-width="1.5" stroke-linecap="round"/>
  <text font-family="Arial" font-size="10" font-weight="700" fill="#FFFFFF" x="356" y="240" text-anchor="middle">20°</text>

  <!-- info row -->
  <rect x="0" y="252" width="400" height="48" fill="#111D30"/>
  <text font-family="Arial" font-size="8" fill="#A8C4E8" x="40" y="268" text-anchor="middle">UMIDADE</text>
  <text font-family="Arial" font-size="11" font-weight="700" fill="#FFFFFF" x="40" y="284" text-anchor="middle">72%</text>
  <line x1="80" y1="258" x2="80" y2="292" stroke="#2A4F8C" stroke-width="0.5"/>
  <text font-family="Arial" font-size="8" fill="#A8C4E8" x="130" y="268" text-anchor="middle">VENTO</text>
  <text font-family="Arial" font-size="11" font-weight="700" fill="#FFFFFF" x="130" y="284" text-anchor="middle">14 km/h</text>
  <line x1="180" y1="258" x2="180" y2="292" stroke="#2A4F8C" stroke-width="0.5"/>
  <text font-family="Arial" font-size="8" fill="#A8C4E8" x="230" y="268" text-anchor="middle">UV</text>
  <text font-family="Arial" font-size="11" font-weight="700" fill="#F5D060" x="230" y="284" text-anchor="middle">Alto</text>
  <line x1="280" y1="258" x2="280" y2="292" stroke="#2A4F8C" stroke-width="0.5"/>
  <text font-family="Arial" font-size="8" fill="#A8C4E8" x="340" y="268" text-anchor="middle">SENSAÇÃO</text>
  <text font-family="Arial" font-size="11" font-weight="700" fill="#FFFFFF" x="340" y="284" text-anchor="middle">26°</text>
</svg>
